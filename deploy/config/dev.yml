# Nakama development configuration.
# Run with: nakama --config deploy/config/dev.yml
name: nakama-dev
data_dir: ./data
shutdown_grace_sec: 5

logger:
  level: DEBUG
  stdout: true
  format: JSON

metrics:
  reporting_freq_sec: 60
  prometheus_port: 9100

database:
  address:
    - root@localhost:26257

session:
  token_expiry_sec: 7200
  refresh_token_expiry_sec: 3600

socket:
  port: 7350
  max_message_size_bytes: 4096

console:
  port: 7351
  username: admin
  password: password # Development only. Never use defaults outside local dev.
  token_expiry_sec: 86400

runtime:
  path: ./data/modules
