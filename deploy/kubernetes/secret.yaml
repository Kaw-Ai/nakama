# Template only — populate values from your secret manager at deploy time
# (e.g. External Secrets Operator, Sealed Secrets, or CI-side kubectl apply).
# NEVER commit real credential values to this file.
apiVersion: v1
kind: Secret
metadata:
  name: nakama-secrets
  labels:
    app: nakama
type: Opaque
stringData:
  database-address: "nakama:CHANGE_ME@postgres:5432/nakama"
  session-encryption-key: "CHANGE_ME"
  session-refresh-encryption-key: "CHANGE_ME"
  console-password: "CHANGE_ME"
  console-signing-key: "CHANGE_ME"
